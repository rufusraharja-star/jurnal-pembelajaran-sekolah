<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Digital | SMAS Kristen Petra 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dashboard">

<div class="container py-4">
    <div class="text-center text-white mb-5 no-print">
        <h1 class="fw-bold">JURNAL PEMBELAJARAN SMAS KRISTEN PETRA 4 SIDOARJO</h1>
        <p class="badge bg-warning text-dark fs-6">Sistem Informasi Pembelajaran Digital 2025/2026</p>
    </div>

    <div class="card glass-card border-0 mb-5 no-print shadow-lg">
        <div class="card-header bg-primary text-white text-center fw-bold">PILIH UNIT/KELAS UNTUK MENGISI JURNAL</div>
        <div class="card-body">
            <div class="text-white text-center mb-2 fw-bold small">KELAS REGULER</div>
            <div id="reguler-buttons" class="row g-2 mb-4 text-center d-flex justify-content-center"></div>
            
            <div class="text-white text-center mb-2 fw-bold small">MPP KELAS XI (A/B/C)</div>
            <div id="mpp-xi-buttons" class="d-flex flex-wrap gap-2 justify-content-center mb-4 border-top pt-3"></div>

            <div class="text-white text-center mb-2 fw-bold small">MPP KELAS XII (A/B/C)</div>
            <div id="mpp-xii-buttons" class="d-flex flex-wrap gap-2 justify-content-center border-top pt-3"></div>
        </div>
    </div>

    <div class="card shadow-lg no-print border-0 overflow-hidden">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-middle">
    <h5 class="mb-0"><i class="bi bi-journal-text me-2"></i>REKAPITULASI JURNAL</h5>
    <div class="d-flex gap-2">
        <button onclick="exportToExcel()" class="btn btn-sm btn-success">
            <i class="bi bi-file-earmark-excel me-1"></i> Export Excel
        </button>
        <button onclick="if(confirm('Hapus semua data?')) { localStorage.removeItem('petra_logs'); location.reload(); }" class="btn btn-sm btn-outline-danger">
            Reset Data
        </button>
    </div>
</div>
        <div class="card-body bg-white p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-secondary">
                        <tr>
                            <th>Tanggal</th>
                            <th>Kelas</th>
                            <th>Guru Pengajar</th>
                            <th>Mata Pelajaran</th>
                            <th class="text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="mainLogBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalCetak" tabindex="-1">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white no-print">
                <h5 class="modal-title">Cetak Kartu Jurnal Pembelajaran</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body bg-light">
                <div class="container no-print mb-4 p-4 bg-white shadow-sm rounded-4">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Filter Guru</label>
                            <select id="filterGuruPreview" class="form-select"><option value="">-- Semua Guru --</option></select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Dari Tanggal</label>
                            <input type="date" id="filterTglStart" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Sampai Tanggal</label>
                            <input type="date" id="filterTglEnd" class="form-control">
                        </div>
                        <div class="col-md-2">
                            <button onclick="applyPreviewFilter()" class="btn btn-primary w-100">Filter</button>
                        </div>
                    </div>
                </div>
                <div id="cardsContainer"></div>
            </div>
            <div class="modal-footer no-print">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
                <button type="button" class="btn btn-success btn-lg px-5" onclick="window.print()">CETAK</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
